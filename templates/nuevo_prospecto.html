{% extends "base.html" %}
{% block title %}Nuevo Prospecto — WhatsApp Sales{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">➕ Agregar prospecto</h1>
  <a href="{{ url_for('prospectos') }}" class="btn btn-secondary">← Volver</a>
</div>

<div class="card" style="max-width:700px;">
  <div class="card-body">
    <form method="post">
      <div class="form-grid">
        <div class="form-group">
          <label for="nombre">Nombre del contacto *</label>
          <input type="text" id="nombre" name="nombre" placeholder="Juan García" required autofocus>
        </div>
        <div class="form-group">
          <label for="telefono">Teléfono *</label>
          <input type="text" id="telefono" name="telefono" placeholder="+5491123456789" required>
          <span class="form-hint">Con código de país. Ej: +54 para Argentina</span>
        </div>
        <div class="form-group">
          <label for="empresa">Empresa</label>
          <input type="text" id="empresa" name="empresa" placeholder="Restaurante El Sol">
        </div>
        <div class="form-group">
          <label for="rubro">Rubro / Industria</label>
          <input type="text" id="rubro" name="rubro" placeholder="gastronomía, salud, retail...">
        </div>
      </div>

      <div class="form-group" style="margin-top:1.25rem;">
        <label for="notas">Notas adicionales</label>
        <textarea id="notas" name="notas" placeholder="Cualquier dato útil sobre este prospecto..."></textarea>
      </div>

      <div class="form-actions" style="margin-top:1.5rem;">
        <button type="submit" class="btn btn-primary">✅ Guardar prospecto</button>
        <a href="{{ url_for('prospectos') }}" class="btn btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>

<div class="card" style="max-width:700px;margin-top:1rem;background:#fffbeb;border:1px solid #fde68a;">
  <div class="card-body" style="font-size:.875rem;color:#92400e;">
    <strong>💡 ¿Tenés muchos contactos?</strong> Usá la opción
    <a href="{{ url_for('importar') }}" style="color:var(--wa-dark);font-weight:600;">Importar CSV</a>
    para cargar varios de una sola vez.
  </div>
</div>
{% endblock %}
